name: Build Unsigned IPA

on:
  workflow_dispatch: # 允许你手动点击按钮触发构建

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: false
          
      - name: Get Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App (No Codesign)
        # 显式禁用签名，避免 CI 环境缺少 Development Team 时失败
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE=""

      - name: Create IPA Structure
        # IPA 本质上就是一个 zip 压缩包，里面有个 Payload 文件夹放 .app
        run: |
          mkdir Payload
          mv build/ios/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -r release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v6
        with:
          name: unsigned-ipa
          path: release.ipa
